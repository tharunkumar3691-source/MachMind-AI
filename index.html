
<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>⚙️ MachMind AI 🛠️</title>
    <link rel="manifest" href="/manifest.json">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
      if (typeof tailwind !== 'undefined') {
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary-green": "#00ff00",
                "primary-blue": "#3B82F6",
                "primary-emerald": "#10B981",
                "background-dark": "#0F172A",
                "card-dark": "#1E293B",
              },
              fontFamily: {
                "display": ["Space Grotesk", "sans-serif"]
              },
              animation: {
                'spin-slow': 'spin 3s linear infinite',
                'reverse-spin': 'reverse-spin 3s linear infinite',
                'ping-slow': 'ping 3s cubic-bezier(0, 0, 0.2, 1) infinite',
              }
            },
          },
        }
      }
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings:
        'FILL' 0,
        'wght' 400,
        'GRAD' 0,
        'opsz' 24
      }
      
      /* Global Scrollbar Hiding */
      ::-webkit-scrollbar {
        display: none;
      }
      
      html, body {
        -ms-overflow-style: none;  /* IE and Edge */
        scrollbar-width: none;  /* Firefox */
        background-color: #0F172A;
        /* Subtle Grid Pattern */
        background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        background-size: 50px 50px;
      }

      .scrollbar-hide::-webkit-scrollbar {
          display: none;
      }
      .scrollbar-hide {
          -ms-overflow-style: none;
          scrollbar-width: none;
      }

      /* AR Scan Animation */
      @keyframes scan {
        0% { top: 0%; opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { top: 100%; opacity: 0; }
      }
      .animate-scan {
        position: absolute;
        left: 0;
        width: 100%;
        height: 2px;
        background: #00ff00;
        box-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00;
        animation: scan 3s linear infinite;
        z-index: 10;
        pointer-events: none;
      }

      /* 3D / Holographic Animations */
      @keyframes reverse-spin {
        from { transform: rotate(360deg); }
        to { transform: rotate(0deg); }
      }

      @keyframes orbit-x {
        0% { transform: rotateX(0deg) rotateY(0deg); }
        100% { transform: rotateX(360deg) rotateY(0deg); }
      }
      
      @keyframes orbit-y {
        0% { transform: rotateY(0deg) rotateX(45deg); }
        100% { transform: rotateY(360deg) rotateX(45deg); }
      }

      @keyframes sound-wave {
        0%, 100% { height: 10%; opacity: 0.5; }
        50% { height: 100%; opacity: 1; }
      }

      .perspective-1000 {
        perspective: 1000px;
      }
      
      .preserve-3d {
        transform-style: preserve-3d;
      }

      .holo-ring {
        position: absolute;
        border-radius: 50%;
        border: 1px solid rgba(0, 255, 0, 0.3);
        box-shadow: 0 0 15px rgba(0, 255, 0, 0.1);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.1/",
    "react": "https://aistudiocdn.com/react@^19.2.1",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.1/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.31.0",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.3"
  }
}
</script>

</head>

</html>
